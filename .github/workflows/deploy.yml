name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name znqm-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # API_KEY 走 Pages 生产环境变量/密钥，请勿在此硬编码：
          # 在 Cloudflare Pages 控制台 -> znqm-site -> Settings -> Variables
          # 添加名为 API_KEY 的 Secret（值 = tokenhub Bearer Key）
