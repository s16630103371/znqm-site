name = "znqm-site"
compatibility_date = "2024-09-23"
# 静态站 + Pages Functions 同仓单部署
# 构建输出即仓库根目录（无构建步骤）
pages_build_output_dir = "."

# 部署： wrangler pages deploy .
# 设置密钥： wrangler pages secret put API_KEY   （填入 tokenhub.tencentmaas.com 的 Bearer Key）
# 自定义域名 znqm.cloud：在 Cloudflare Pages 控制台 -> Custom domains 添加一次即可
